    <style>
      :root {
        --primary-color: #f97316;
        --primary-hover: #ea580c;
        --bg-color: #030712;
      }
      body {
        background-color: var(--bg-color); /* gray-950 */
        color: white;
      }
      .leaflet-container { background-color: #030712; }
      .map-label-tooltip {
        background-color: rgba(17, 24, 39, 0.9);
        border-color: rgba(249, 115, 22, 0.6);
        color: #FFFFFF;
        font-weight: 800;
        box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        border-radius: 12px;
        padding: 8px 16px;
        border-width: 1.5px;
        white-space: nowrap;
        text-transform: uppercase;
        font-size: 10px;
        letter-spacing: 0.05em;
      }
      /* Previne scroll elástico no iOS */
      html, body {
        position: fixed;
        overflow: hidden;
        width: 100%;
        height: 100%;
      }
      #root {
        height: 100%;
        width: 100%;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
      @keyframes slideUp {
        from { transform: translateY(100%); }
        to { transform: translateY(0); }
      }
      .animate-slideUp {
        animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      
      @media print {
        @page { margin: 1cm; }
        .no-print { display: none !important; }
        .print-only { display: block !important; }
        body { 
          background: white !important; 
          color: black !important; 
          position: relative !important;
          overflow: visible !important;
        }
        #root { 
          overflow: visible !important; 
          position: relative !important;
          background: white !important;
          color: black !important;
        }
        .bg-gray-900, .bg-gray-800, .bg-gray-700, .bg-gray-950, .bg-black { 
          background: white !important; 
          color: black !important;
          border-color: #eee !important;
        }
        .text-white, .text-gray-300, .text-gray-400 { color: black !important; }
        .shadow-2xl, .shadow-xl, .shadow-lg, .shadow-md, .shadow-inner { shadow: none !important; }
        .border-gray-700, .border-gray-800, .border-gray-600 { border-color: #eee !important; }
        
        .printable-report {
          display: block !important;
          width: 100% !important;
          color: black !important;
        }
      }
      .print-only { display: none; }
    </style>
